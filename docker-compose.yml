version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: backend
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3307/sgtg?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: oracle
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: oracle
      MYSQL_DATABASE: sgtg
      MYSQL_TCP_PORT: 3307
    ports:
      - "3307:3307"
    command: --port=3307 --bind-address=0.0.0.0
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
